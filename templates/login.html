{% extends 'base.html' %}

{% block content %}
<div class="login-shell">
    <div class="card login-card">
        <div class="login-head">
            <h2>EduGrades</h2>
            <p>Student report card management system</p>
        </div>

        <div class="role-tabs">
            <button type="button" class="tab-btn is-active" onclick="switchTab('teacher')" id="teacher-tab">Teacher</button>
            <button type="button" class="tab-btn" onclick="switchTab('student')" id="student-tab">Student</button>
        </div>

        <div id="teacher-form">
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="teacher">
                <div class="form-group">
                    <label for="teacher-username">Username</label>
                    <input type="text" id="teacher-username" name="username" class="form-control" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="teacher-password">Password</label>
                    <input type="password" id="teacher-password" name="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary login-btn">Login as Teacher</button>
            </form>
            <div class="login-note">
                <p><strong>Demo Credentials</strong></p>
                <p>Username: <code>teacher</code></p>
                <p>Password: <code>admin123</code></p>
            </div>
        </div>

        <div id="student-form" class="hidden">
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="student">
                <div class="form-group">
                    <label for="student-rollno">Roll Number</label>
                    <input type="text" id="student-rollno" name="username" class="form-control" required placeholder="Enter roll number">
                </div>
                <div class="form-group">
                    <label for="student-password">Password</label>
                    <input type="password" id="student-password" name="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary login-btn">Login as Student</button>
            </form>
            <div class="login-note">
                <p>Ask your teacher for student credentials.</p>
            </div>
        </div>
    </div>
</div>

<style>
    .login-shell {
        min-height: calc(100vh - 180px);
        display: grid;
        place-items: center;
    }

    .login-card {
        width: 100%;
        max-width: 460px;
    }

    .login-head {
        text-align: center;
        margin-bottom: 1rem;
    }

    .login-head h2 {
        margin-bottom: 0.25rem;
    }

    .login-head p {
        margin: 0;
        color: var(--text-muted);
    }

    .role-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 1rem;
        padding: 0.3rem;
        background: var(--surface-soft);
        border-radius: var(--radius);
        border: 1px solid var(--border);
    }

    .tab-btn {
        border: 0;
        background: transparent;
        padding: 0.6rem;
        border-radius: 10px;
        font: inherit;
        font-weight: 700;
        color: var(--text-muted);
        cursor: pointer;
    }

    .tab-btn.is-active {
        color: #fff;
        background: var(--primary);
    }

    .hidden {
        display: none;
    }

    .login-btn {
        width: 100%;
        margin-top: 0.35rem;
    }

    .login-note {
        margin-top: 0.9rem;
        padding: 0.8rem;
        border-radius: var(--radius-sm);
        background: var(--surface-soft);
        color: var(--text-muted);
        border: 1px solid var(--border);
    }

    .login-note p {
        margin: 0.2rem 0;
        font-size: 0.9rem;
    }

    .login-note code {
        background: #fff;
        border: 1px solid var(--border);
        padding: 0.1rem 0.4rem;
        border-radius: 7px;
        color: var(--text-main);
    }
</style>

<script>
    function switchTab(tab) {
        const teacherForm = document.getElementById('teacher-form');
        const studentForm = document.getElementById('student-form');
        const teacherTab = document.getElementById('teacher-tab');
        const studentTab = document.getElementById('student-tab');

        if (tab === 'teacher') {
            teacherForm.classList.remove('hidden');
            studentForm.classList.add('hidden');
            teacherTab.classList.add('is-active');
            studentTab.classList.remove('is-active');
            document.getElementById('teacher-username').focus();
        } else {
            teacherForm.classList.add('hidden');
            studentForm.classList.remove('hidden');
            teacherTab.classList.remove('is-active');
            studentTab.classList.add('is-active');
            document.getElementById('student-rollno').focus();
        }
    }
</script>
{% endblock %}
