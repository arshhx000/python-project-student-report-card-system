{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>Add New Student</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Register a new student into the system.</p>

    <form method="POST" action="{{ url_for('add_student') }}">
        <div class="form-group">
            <label for="name">Student Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g. John Doe">
        </div>
        
        <div class="form-group">
            <label for="roll_no">Roll Number</label>
            <input type="text" id="roll_no" name="roll_no" class="form-control" required placeholder="e.g. 001 or A001">
        </div>
        
        <div class="form-group">
            <label for="class_name">Grade / Class Level</label>
            <input type="text" id="class_name" name="class_name" class="form-control" required placeholder="e.g. 10th Grade">
        </div>

        <div class="form-group">
            <label for="section">Section</label>
            <select id="section" name="section" class="form-control">
                <option value="A">Section A</option>
                <option value="B">Section B</option>
                <option value="C">Section C</option>
                <option value="D">Section D</option>
            </select>
        </div>

        <div class="form-group">
            <label for="password">Initial Password (for student login)</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="e.g. student123">
            <small style="color: var(--text-muted);">Leave blank to generate random password</small>
        </div>
        
        <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <a href="{{ url_for('index' if session.get('role') == 'teacher' else 'student_dashboard') }}" style="color: var(--text-muted); text-decoration: none; font-weight: 600;">Cancel</a>
            <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;">Save Student</button>
        </div>
    </form>
</div>
{% endblock %}
